<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier Process — Traçabilité Airbag</title>

<!-- Fonts (identiques à la version originale) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!-- Tailwind CDN (JIT) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
          display: ['Space Grotesk', 'sans-serif'],
        },
      },
    },
  };
</script>

<link rel="stylesheet" href="css/style.css" />

<!-- sql.js (moteur SQLite compilé en WebAssembly = vraie base de données SQL côté client) -->

  </div>

  <script src="js/db.js"></script>
