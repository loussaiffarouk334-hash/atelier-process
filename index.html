<!-- Thème (sombre par défaut) — appliqué AVANT le premier rendu pour éviter tout flash -->
<script>
  (function () {
    var saved = localStorage.getItem("atelier-theme");
    window.__ATELIER_THEME__ = saved === "light" ? "light" : "dark";
    if (window.__ATELIER_THEME__ === "light") {
      document.documentElement.classList.add("theme-light");
    }
  })();
</script>

<!-- Supabase JS (client pour la base de données PARTAGÉE, hébergée dans le cloud) -->

</head>
<body class="font-sans antialiased">

  <!-- L'intro 3D "porte du LEAR" sera insérée ici par landing/door-3d.js -->
  <div id="app-root" style="opacity:0;transition:opacity .8s ease"></div>

  <!-- Scene 3D immersive : on s'approche du bâtiment, on clique sur la porte, elle s'ouvre, on rentre -->
  <script src="landing/door-3d.js"></script>
  <script>
    // Une fois que la scène 3D est retirée du DOM, on révèle l'app en douceur
    (function () {
      const root = document.getElementById("app-root");
      const obs = new MutationObserver(() => {
        const intro = document.getElementById("door-intro");
        if (!intro && root && root.style.opacity === "0") {
          root.style.opacity = "1";
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
    })();
  </script>

  <!-- Notification toast globale -->
  <div id="global-toast" class="fixed bottom-6 right-6 hidden bg-slate-950 border-l-4 border-rose-500 text-white text-xs font-semibold py-3 px-5 rounded-2xl shadow-premium-3 items-center gap-2.5 z-[100]">
    <span id="global-toast-icon">●</span>
    <span id="global-toast-msg"></span>
  </div>
